<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0">
<meta name="theme-color" content="#f4f8f7">
<title>Las recetas de la abuela · por Chef Alba</title>
<meta name="description" content="Recetario familiar digital con las recetas tradicionales de la abuela, valoradas y comentadas por Chef Alba">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600;9..144,700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">

<link rel="stylesheet" href="css/styles.css">
<style>
  /* ============================================
     Subtítulo grande con icono ilustrado
     ============================================ */
  .hero-sub-top {
    font-family: 'Fraunces', Georgia, serif !important;
    font-size: clamp(22px, 4vw, 32px) !important;
    font-weight: 500 !important;
    letter-spacing: 0 !important;
    text-transform: none !important;
    color: #4a7771 !important;
    margin-bottom: 0.5rem !important;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 0.7rem;
    flex-wrap: wrap;
  }
  .hero-chef-svg {
    width: 56px;
    height: 56px;
    flex-shrink: 0;
    filter: drop-shadow(0 2px 4px rgba(74, 119, 113, 0.15));
  }
  @media (max-width: 480px) {
    .hero-sub-top {
      font-size: 18px !important;
      gap: 0.5rem;
    }
    .hero-chef-svg { width: 42px; height: 42px; }
  }

  /* ============================================
     Hojas verdes saludable - gris cuando vacío,
     verde cuando seleccionado (como las estrellas)
     ============================================ */
  .health-btn {
    color: #d9e6e2 !important;
    filter: grayscale(100%) opacity(0.55);
    transition: all 0.15s !important;
  }
  .health-btn.active {
    color: inherit !important;
    filter: none;
  }
  .health-btn:hover {
    filter: none;
    opacity: 0.85;
  }

  /* ============================================
     Filtros colapsables en MÓVIL
     ============================================ */
  .collapsible-header { display: none; }

  @media (max-width: 768px) {
    .filter-group.collapsible {
      border: 1px solid #e6efec;
      border-radius: 14px;
      overflow: hidden;
      margin-bottom: 0.6rem;
      background: #ffffff;
    }
    .filter-group.collapsible > .filter-label,
    .filter-group.collapsible > .rating-filter > .filter-label {
      display: none;
    }
    .filter-group.collapsible .collapsible-body > .filter-label,
    .filter-group.collapsible .collapsible-body .rating-filter .filter-label {
      display: block;
    }
    .filter-group.collapsible .collapsible-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      width: 100%;
      padding: 11px 16px;
      background: transparent;
      border: none;
      cursor: pointer;
      font-family: 'Inter', sans-serif;
      font-size: 12px;
      font-weight: 600;
      color: #546a66;
      text-transform: uppercase;
      letter-spacing: 1px;
    }
    .filter-group.collapsible .collapsible-header > span:first-child {
      display: flex;
      align-items: center;
    }
    .filter-group.collapsible .collapsible-header .chevron {
      font-size: 22px;
      transition: transform 0.25s;
      color: #5d8a82;
      font-weight: 300;
      line-height: 1;
    }
    .filter-group.collapsible.open .collapsible-header .chevron {
      transform: rotate(45deg);
    }
    .filter-group.collapsible .collapsible-body {
      max-height: 0;
      overflow: hidden;
      transition: max-height 0.3s ease-out, padding 0.3s ease-out;
      padding: 0 16px;
    }
    .filter-group.collapsible.open .collapsible-body {
      max-height: 600px;
      padding: 0 16px 14px;
    }
    .filter-group.collapsible .active-count {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-width: 20px;
      height: 20px;
      padding: 0 6px;
      border-radius: 999px;
      background: #5d8a82;
      color: white;
      font-size: 11px;
      font-weight: 600;
      margin-left: 8px;
    }
    .filter-group.collapsible .active-count.hidden { display: none; }

    .ratings-row.mobile-stack {
      display: block !important;
      grid-template-columns: none !important;
    }
    .ratings-row.mobile-stack .collapsible-body .rating-filter + .rating-filter {
      margin-top: 0.75rem;
    }
  }
</style>
</head>
<body>

<header class="site-header">
  <div class="container header-inner">
    <a href="#" class="logo-mini" onclick="resetView(event)" aria-label="Inicio">
      <span>🍽️</span>
    </a>

    <div class="lang-switcher">
      <button class="lang-btn active" data-lang="es" onclick="setLanguage('es')">ES</button>
      <button class="lang-btn" data-lang="en" onclick="setLanguage('en')">EN</button>
    </div>
  </div>
</header>

<main>

  <!-- HERO -->
  <section class="hero">
    <div class="container">
      <p class="hero-sub-top">
        <svg class="hero-chef-svg" viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
          <defs>
            <linearGradient id="hatGrad" x1="0%" y1="0%" x2="0%" y2="100%">
              <stop offset="0%" stop-color="#ffffff"/>
              <stop offset="100%" stop-color="#f5fbf9"/>
            </linearGradient>
            <linearGradient id="bgGrad" x1="0%" y1="0%" x2="0%" y2="100%">
              <stop offset="0%" stop-color="#d4e8e8"/>
              <stop offset="100%" stop-color="#b8d6cf"/>
            </linearGradient>
          </defs>

          <!-- Fondo circular suave -->
          <circle cx="32" cy="32" r="30" fill="url(#bgGrad)"/>

          <!-- Cara -->
          <circle cx="32" cy="36" r="14" fill="#fde7d6"/>

          <!-- Mejillas -->
          <circle cx="25" cy="40" r="2" fill="#f4b8a8" opacity="0.7"/>
          <circle cx="39" cy="40" r="2" fill="#f4b8a8" opacity="0.7"/>

          <!-- Ojos -->
          <circle cx="27.5" cy="36" r="1.4" fill="#2a3833"/>
          <circle cx="36.5" cy="36" r="1.4" fill="#2a3833"/>

          <!-- Sonrisa -->
          <path d="M 28 42 Q 32 45 36 42" stroke="#a85c4a" stroke-width="1.5" fill="none" stroke-linecap="round"/>

          <!-- Mechones de pelo -->
          <path d="M 22 30 Q 24 26 28 27" stroke="#6b4226" stroke-width="2.5" fill="none" stroke-linecap="round"/>
          <path d="M 42 30 Q 40 26 36 27" stroke="#6b4226" stroke-width="2.5" fill="none" stroke-linecap="round"/>

          <!-- Banda del gorro -->
          <rect x="18" y="22" width="28" height="5" rx="1.5" fill="#ffffff" stroke="#e0eae5" stroke-width="0.5"/>

          <!-- Copa del gorro -->
          <path d="M 19 22 
                   Q 14 14 22 11
                   Q 24 6 32 8
                   Q 40 6 42 11
                   Q 50 14 45 22 Z"
                fill="url(#hatGrad)"
                stroke="#d4e0db"
                stroke-width="0.8"/>

          <!-- Detalles del gorro -->
          <ellipse cx="25" cy="14" rx="2.5" ry="3" fill="#ffffff" opacity="0.6"/>
          <ellipse cx="32" cy="11" rx="3" ry="3.5" fill="#ffffff" opacity="0.5"/>
        </svg>
        <span data-i18n="hero_sub_top">Las recetas de la abuela</span>
      </p>
      <h1 class="hero-title" data-i18n="hero_title">por Chef Alba</h1>
      <p class="hero-subtitle" data-i18n="hero_subtitle">383 recetas familiares con la valoración y los consejos de Chef Alba</p>
    </div>
  </section>

  <!-- SEARCH & FILTERS -->
  <section class="filters-section">
    <div class="container">

      <div class="search-bar">
        <svg class="search-icon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg>
        <input type="text" id="search-input" data-i18n-placeholder="search_placeholder" placeholder="Buscar por nombre o ingrediente...">
        <button class="clear-search hidden" id="clear-search" onclick="clearSearch()" aria-label="Limpiar búsqueda">×</button>
      </div>

      <!-- Tipo de plato (siempre visible) -->
      <div class="filter-group">
        <p class="filter-label" data-i18n="filter_type">Tipo de plato</p>
        <div class="tag-list" id="filters-tipo"></div>
      </div>

      <!-- Etiquetas: colapsable en móvil -->
      <div class="filter-group collapsible" id="group-especial">
        <button class="collapsible-header" onclick="toggleCollapsible('group-especial')" aria-expanded="false" type="button">
          <span><span data-i18n="filter_special">Etiquetas</span><span class="active-count hidden" id="count-especial">0</span></span>
          <span class="chevron">+</span>
        </button>
        <p class="filter-label" data-i18n="filter_special">Etiquetas</p>
        <div class="collapsible-body">
          <div class="tag-list" id="filters-especial"></div>
        </div>
      </div>

      <!-- Ratings: colapsables en móvil -->
      <div class="filter-group collapsible ratings-row mobile-stack" id="group-ratings">
        <button class="collapsible-header" onclick="toggleCollapsible('group-ratings')" aria-expanded="false" type="button">
          <span><span data-i18n="filter_rating_label">Filtrar por valoración</span><span class="active-count hidden" id="count-ratings">0</span></span>
          <span class="chevron">+</span>
        </button>
        <div class="collapsible-body">
          <div class="rating-filter">
            <p class="filter-label" data-i18n="filter_taste">Sabor mínimo</p>
            <div class="star-filter" id="filter-sabor"></div>
          </div>
          <div class="rating-filter">
            <p class="filter-label" data-i18n="filter_health">Saludable mínimo</p>
            <div class="health-filter" id="filter-saludable"></div>
          </div>
        </div>
      </div>

      <div class="results-bar">
        <span class="results-count" id="results-count">383 recetas</span>
        <div class="results-actions">
          <button class="text-btn" id="reset-filters" onclick="resetFilters()" data-i18n="reset">Limpiar filtros</button>
          <select id="sort-select" onchange="applyFilters()">
            <option value="favoritas" data-i18n="sort_fav">Favoritas de Chef Alba</option>
            <option value="sabor" data-i18n="sort_taste">Mejor sabor</option>
            <option value="saludable" data-i18n="sort_health">Más saludables</option>
            <option value="az" data-i18n="sort_az">A → Z</option>
          </select>
        </div>
      </div>

    </div>
  </section>

  <!-- RECIPES GRID -->
  <section class="recipes-section">
    <div class="container">
      <div class="recipes-grid" id="recipes-grid"></div>
      <div class="empty-state hidden" id="empty-state">
        <div class="empty-icon">🔍</div>
        <p data-i18n="no_results">No encontramos recetas con esos filtros</p>
        <button class="btn-primary" onclick="resetFilters()" data-i18n="reset_filters">Limpiar filtros</button>
      </div>
    </div>
  </section>

</main>

<!-- RECIPE MODAL -->
<div class="modal-backdrop hidden" id="modal-backdrop" onclick="closeModalFromBackdrop(event)">
  <article class="modal" id="modal" role="dialog" aria-modal="true">
    <button class="modal-close" onclick="closeModal()" aria-label="Cerrar">×</button>
    <div id="modal-content"></div>
  </article>
</div>

<footer class="site-footer">
  <div class="container">
    <p data-i18n="footer">Un proyecto personal de Chef Alba · Las recetas de la abuela 🍽️</p>
  </div>
</footer>

<script src="js/firebase.js" type="module"></script>
<script src="js/i18n.js"></script>
<script src="js/app.js"></script>

<!-- Colapsables y contador de filtros activos -->
<script>
  function toggleCollapsible(id) {
    const el = document.getElementById(id);
    el.classList.toggle('open');
    const btn = el.querySelector('.collapsible-header');
    if (btn) btn.setAttribute('aria-expanded', el.classList.contains('open'));
  }

  function updateActiveCounts() {
    const especialActive = document.querySelectorAll('#filters-especial .tag.active').length;
    const badgeEspecial = document.getElementById('count-especial');
    if (badgeEspecial) {
      badgeEspecial.textContent = especialActive;
      badgeEspecial.classList.toggle('hidden', especialActive === 0);
    }
    const saborActive = document.querySelectorAll('#filter-sabor .star-btn.active').length > 0 ? 1 : 0;
    const saludActive = document.querySelectorAll('#filter-saludable .health-btn.active').length > 0 ? 1 : 0;
    const ratingsCount = saborActive + saludActive;
    const badgeRatings = document.getElementById('count-ratings');
    if (badgeRatings) {
      badgeRatings.textContent = ratingsCount;
      badgeRatings.classList.toggle('hidden', ratingsCount === 0);
    }
  }

  document.addEventListener('click', (e) => {
    if (e.target.closest('.tag, .star-btn, .health-btn, #reset-filters')) {
      setTimeout(updateActiveCounts, 50);
    }
  });

  window.addEventListener('DOMContentLoaded', () => setTimeout(updateActiveCounts, 400));
</script>

</body>
</html>
